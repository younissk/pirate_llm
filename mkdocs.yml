site_name: nanoBeard
site_description: Tiny pirate LLM — multi-version
repo_url: https://github.com/younissk/pirate_llm
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: amber
      accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture: architecture.md
  - Adding a model: adding-a-model.md
  - Eval harness: eval.md
  - Vast.ai: vast-ai.md
  - TODO: todo.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false

watch:
  - nanobeard
